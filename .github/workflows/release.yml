name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # 手动触发只验证构建,不发 release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      # bpf2go 需要 clang/llvm-strip 编译 eBPF 字节码
      - run: sudo apt-get update && sudo apt-get install -y clang llvm

      - run: ./gradlew assembleDebug assembleRelease
        env:
          VERSION_NAME: ${{ github.ref_name }}  # tag v1.2.3 → versionName 1.2.3 / versionCode 10203

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
